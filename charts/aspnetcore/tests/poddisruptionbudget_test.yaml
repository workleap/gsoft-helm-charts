suite: poddisruptionbudget tests
templates:
  - poddisruptionbudget.yaml
tests:
  - it: should not be created when environment is Development (default)
    set:
      replicaCount: 3
      autoscaling:
        enabled: false
      httpRoute:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not be created when environment is Production but replicas == 1
    set:
      environment: Production
      autoscaling:
        enabled: false
      replicaCount: 1
      httpRoute:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PDB with maxUnavailable 50% when Production and replicaCount 2
    set:
      environment: Production
      autoscaling:
        enabled: false
      replicaCount: 2
      httpRoute:
        create: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: RELEASE-NAME-pdb
      - equal:
          path: spec.maxUnavailable
          value: "50%"

  - it: should create PDB with maxUnavailable 50% regardless of replicaCount
    set:
      environment: Production
      autoscaling:
        enabled: false
      replicaCount: 10
      httpRoute:
        create: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.maxUnavailable
          value: "50%"

  - it: should create PDB with maxUnavailable 50% when autoscaling enabled
    set:
      environment: Production
      autoscaling:
        enabled: true
        minReplicas: 4
        maxReplicas: 8
      replicaCount: 1
      httpRoute:
        create: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.maxUnavailable
          value: "50%"

  - it: should use existingSelectors when migration.existingSelectors.enabled is true
    set:
      environment: Production
      autoscaling:
        enabled: false
      replicaCount: 2
      httpRoute:
        create: false
      migration:
        existingSelectors:
          enabled: true
          selectors:
            app: my-app
            version: v1
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.selector.matchLabels
          value:
            app: my-app
            version: v1

  - it: should use standard selector labels when migration.existingSelectors is disabled
    set:
      environment: Production
      autoscaling:
        enabled: false
      replicaCount: 2
      httpRoute:
        create: false
    asserts:
      - equal:
          path: spec.selector.matchLabels
          value:
            app.kubernetes.io/name: aspnetcore
            app.kubernetes.io/instance: RELEASE-NAME
