suite: httproute tests
templates:
  - httproute.yaml
tests:
  - it: should not create HTTPRoute when httpRoute.create is false
    set:
      httpRoute:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create HTTPRoute when httpRoute.create is true
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-httproute

  - it: should use custom name when specified
    set:
      httpRoute:
        create: true
        name: my-custom-route
        hostname: "example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-route

  - it: should set parentRefs correctly
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: platform-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: istio-ingress

  - it: should support parentRef with sectionName
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
            sectionName: https
    asserts:
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https

  - it: should set hostname correctly
    set:
      httpRoute:
        create: true
        hostname: "myapp.example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: "myapp.example.com"

  - it: should configure path and pathType
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        path: /api
        pathType: Exact
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: Exact
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api

  - it: should include additional paths as extra matches
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        path: /
        pathType: PathPrefix
        additionalPaths:
          - /api
          - /health
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /
      - equal:
          path: spec.rules[0].matches[1].path.value
          value: /api
      - equal:
          path: spec.rules[0].matches[1].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[2].path.value
          value: /health

  - it: should generate default backendRef from service name and port
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
      service:
        port: 8080
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME-service
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080

  - it: should use custom service name in default rule
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
      service:
        name: my-custom-svc
        port: 80
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: my-custom-svc

  - it: should set timeout when specified
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        timeout: "60s"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
    asserts:
      - equal:
          path: spec.rules[0].timeouts.request
          value: "60s"

  - it: should not set timeout when empty
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        timeout: ""
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
    asserts:
      - isNull:
          path: spec.rules[0].timeouts

  - it: should use custom rules when specified
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /api
            backendRefs:
              - name: api-service
                port: 3000
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: api-service
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 3000

  - it: should apply commonLabels and commonAnnotations
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
      commonLabels:
        environment: "production"
      commonAnnotations:
        owner: "team-a"
    asserts:
      - equal:
          path: metadata.labels.environment
          value: "production"
      - equal:
          path: metadata.annotations.owner
          value: "team-a"

  - it: should apply httpRoute-specific annotations
    set:
      httpRoute:
        create: true
        hostname: "example.com"
        parentRefs:
          - name: platform-gateway
            namespace: istio-ingress
        annotations:
          custom-annotation: "custom-value"
    asserts:
      - equal:
          path: metadata.annotations.custom-annotation
          value: "custom-value"
