apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ default (printf "%s-deployment" .Release.Name) .Values.deployment.name }}
  labels:
    {{- include "aspnetcore.standardLabels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
      {{- toYaml .Values.commonLabels | nindent 4 }}
    {{- end }}
  annotations:
    {{- with .Values.commonAnnotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- if .Values.migration.existingSelectors.enabled }}
        {{- toYaml .Values.migration.existingSelectors.selectors | nindent 6 }}
      {{- else }}
        {{ include "aspnetcore.selectorLabels" . | nindent 6 }}
      {{- end }}
  template:
    metadata:
      labels:
        {{- if .Values.migration.existingSelectors.enabled }}
          {{- toYaml .Values.migration.existingSelectors.selectors | nindent 8 }}
        {{- else }}
          {{ include "aspnetcore.selectorLabels" . | nindent 8 }}
        {{- end }}
        {{- if .Values.podLabels }}
          {{- toYaml .Values.podLabels | nindent 8 }}
        {{- end }}
        {{- if .Values.aadPodIdentityBinding.create }}
        aadpodidbinding: {{ .Values.aadPodIdentityBinding.identityName }}
        {{- end }}
        {{- if .Values.azureWorkloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- /*
        Build effective pod-level securityContext by merging, in order:
          1. presets.restrictedSecurityContext defaults (when enabled)
          2. user-provided podSecurityContext (overrides preset)
          3. sysctls (when securityContext.enabled)
      */ -}}
      {{- $podSC := dict }}
      {{- if .Values.presets.restrictedSecurityContext.enabled }}
        {{- $_ := set $podSC "runAsNonRoot" true }}
      {{- end }}
      {{- if .Values.podSecurityContext }}
        {{- $podSC = mustMergeOverwrite $podSC .Values.podSecurityContext }}
      {{- end }}
      {{- if .Values.securityContext.enabled }}
        {{- $_ := set $podSC "sysctls" .Values.securityContext.sysctls }}
      {{- end }}
      {{- if $podSC }}
      securityContext:
        {{- toYaml $podSC | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.topologySpreadConstraints | nindent 8 }}
      {{- else if .Values.presets.spreadAcrossNodes.enabled }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- if .Values.migration.existingSelectors.enabled }}
                {{- toYaml .Values.migration.existingSelectors.selectors | nindent 14 }}
              {{- else }}
                {{ include "aspnetcore.selectorLabels" . | nindent 14 }}
              {{- end }}
      {{- end }}
      {{- if .Values.aadPodIdentityBinding.create }}
      # Kubernetes API access required when using the deprecated aadPodIdentityBinding
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      serviceAccountName: {{ include "aspnetcore.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}-container
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- /*
            Build effective container-level securityContext by merging, in order:
              1. presets.restrictedSecurityContext defaults (when enabled)
              2. user-provided containerSecurityContext (overrides preset)
          */ -}}
          {{- $containerSC := dict }}
          {{- if .Values.presets.restrictedSecurityContext.enabled }}
            {{- $_ := set $containerSC "allowPrivilegeEscalation" false }}
            {{- $_ := set $containerSC "capabilities" (dict "drop" (list "ALL")) }}
          {{- end }}
          {{- if .Values.containerSecurityContext }}
            {{- $containerSC = mustMergeOverwrite $containerSC .Values.containerSecurityContext }}
          {{- end }}
          {{- if $containerSC }}
          securityContext:
            {{- toYaml $containerSC | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.image.containerPort }}
          {{- if or .Values.aspnetcore.injectEnvVars .Values.extraEnvVars }}
          env:
          {{- if .Values.aspnetcore.injectEnvVars }}
            - name: DOTNET_ENVIRONMENT
              value: {{ .Values.environment | quote }}
            - name: ASPNETCORE_URLS
              value: {{ printf "http://+:%d" (int .Values.image.containerPort) | quote }}
          {{- end }}
          {{- range .Values.extraEnvVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- . | trim | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- if .Values.certificateStore.enabled }}
          - name: certificate-store
            mountPath: "/etc/ssl/certs/ca-certificates.crt"
            subPath: {{ quote .Values.certificateStore.fileName }}
            readOnly: true
          {{- end }}
          {{- if .Values.extraVolumeMounts }}
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      {{- if .Values.certificateStore.enabled }}
      - name: certificate-store
        configMap:
          name: {{ .Values.certificateStore.configMapName }}
          defaultMode: 0644
          optional: false
          items:
          - key: {{ .Values.certificateStore.fileName }}
            path: {{ .Values.certificateStore.fileName }}
      {{- end }}
      {{- if .Values.extraVolumes}}
        {{- toYaml .Values.extraVolumes | nindent 8 }}
      {{- end }}
