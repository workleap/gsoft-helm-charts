## @param replicaCount Number of ASP.NET Core replicas to deploy
##
## Production deployments require replicaCount > 1 (or autoscaling.minReplicas > 1) for a PDB to be created
replicaCount: 2

## @param service.terminationGracePeriodSeconds The duration in seconds the pod needs to terminate gracefully
terminationGracePeriodSeconds: 30

## @param environment The ASP.NET Core environment name (DOTNET_ENVIRONMENT)
##
environment: Development

## @param commonLabels Labels to add to all deployed objects
##
commonLabels: {}

## @param commonAnnotations Annotations to add to all deployed objects
##
commonAnnotations: {}

## ASP.NET Core image
## @param image.registry ASP.NET Core image registry
## @param image.repository ASP.NET Core image repository
## @param image.tag ASP.NET Core image tag (immutable tags are recommended)
## @param image.pullPolicy ASP.NET Core image pull policy
## @param image.containerPort Container port the workload listens on
##
image:
  registry: mcr.microsoft.com
  repository: dotnet/samples
  tag: aspnetapp
  pullPolicy: IfNotPresent
  containerPort: 8080

## ASP.NET Core specific behavior
## @param aspnetcore.injectEnvVars Inject DOTNET_ENVIRONMENT and ASPNETCORE_URLS env vars into the container. Set to false for non-.NET workloads.
##
aspnetcore:
  injectEnvVars: true

## ASP.NET Core Service parameters.
## @param service.name Name of the service, automatically generated from the release name if not specified
## @param service.port ASP.NET Core service HTTP port
## @param service.annotations Additional custom annotations for ASP.NET Core service
service:
  name: ""
  port: 80
  annotations: {}

## Configure the HTTPRoute resource for Gateway API (gateway.networking.k8s.io/v1)
## @param httpRoute.create Specifies whether an HTTPRoute resource should be created
## @param httpRoute.name Name of the HTTPRoute, automatically generated from the release name if not specified
## @param httpRoute.hostname Hostname for the HTTPRoute
## @param httpRoute.path Default path for the HTTPRoute match
## @param httpRoute.additionalPaths Additional paths for the HTTPRoute matches
## @param httpRoute.pathType HTTPRoute path match type
## Use pathType: PathPrefix if the path contains only alphanumerical and "/" characters.
## Use pathType: RegularExpression if the path contains REGEX.
## @param httpRoute.annotations Additional annotations for the HTTPRoute resource
## @param httpRoute.timeout Request timeout in Gateway API duration format (e.g. "60s", "5m"). Empty means no timeout (use gateway/mesh defaults)
## @param httpRoute.parentRefs List of parent gateway references (must include at least name; namespace and sectionName are optional)
## @param httpRoute.rules Advanced: custom HTTPRoute rules. When non-empty, overrides path/additionalPaths/pathType/timeout
##
httpRoute:
  create: true
  name: ""
  hostname: aspnetcore.example.local
  path: /
  additionalPaths: []
  pathType: PathPrefix
  annotations: {}
  timeout: ""
  parentRefs: []
  rules: []

## ASP.NET Core deployment parameters
## @param deployment.name Name of the deployment, automatically generated from the release name if not specified
##
deployment:
  name: ""

## ASP.NET Core containers' resource requests and limits defined in YAML
## ref: https://kubernetes.io/docs/user-guide/compute-resources/
##
resources:
  limits:
    memory: "128Mi"
  requests:
    cpu: "50m"
    memory: "128Mi"

## @param readinessProbe Optional YAML definition of the readinessProbe, e.g:
# readinessProbe:
#   httpGet:
#     path: "/health"
#     port: http
#   initialDelaySeconds: 30
#   periodSeconds: 5
#   failureThreshold: 6
##
readinessProbe: {}

## @param lifecycle Optional YAML definition of the lifecycle, e.g:
# lifecycle: |
#   preStop:
#     exec:
#       command: ["sleep", "90"]
##
lifecycle: ""

## @param livenessProbe Optional YAML definition of the livenessProbe, e.g:
# livenessProbe:
#   httpGet:
#     path: "/health"
#     port: http
#   initialDelaySeconds: 30
#   periodSeconds: 5
#   timeoutSeconds: 10
#   failureThreshold: 3
##
livenessProbe: {}

## @param startupProbe Optional YAML definition of the startupProbe
##
startupProbe: {}

## @param extraEnvVars Extra environment variables to be set on ASP.NET Core container, e.g:
## extraEnvVars:
##   - name: FOO
##     value: BAR
##
extraEnvVars: []

## @param podAnnotations Annotations for ASP.NET Core pods
##
podAnnotations: {}

## @param podLabels Extra labels for ASP.NET Core pods
##
podLabels: {}

## @param affinity Affinity for pod assignment
## Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
##
affinity: {}

## @param nodeSelector Node labels for pod assignment
## ref: https://kubernetes.io/docs/user-guide/node-selection/
##
nodeSelector: {}

## @param tolerations Tolerations for pod assignment
## ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
##
tolerations: []

## @param topologySpreadConstraints for pods
## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
## notes: Setting the topologySpreadConstraints will override the helm chart's `spreadAcrossNodes` preset
topologySpreadConstraints: []

## Kubernetes service account
## @param serviceAccount.create Specifies whether a ServiceAccount should be created
## @param serviceAccount.name The name of the ServiceAccount to use, even if "create" is false
## @param serviceAccount.annotations Additional custom annotations for the ServiceAccount
##
serviceAccount:
  create: false
  name: ""
  annotations: {}

## Azure AD Pod Identity binding (https://github.com/Azure/aad-pod-identity) - Deprecated since October 24, 2022; use azureWorkloadIdentity instead
## @param aadPodIdentityBinding.create Whether or not to create an AAD pod identity binding associated to the deployment
## @param aadPodIdentityBinding.name Name of the AAD pod identity binding, automatically generated from the release name if not specified
## @param aadPodIdentityBinding.identityName Name of the AAD identity
##
aadPodIdentityBinding:
  create: false
  name: ""
  identityName: ""

## Azure Workload Identity (https://learn.microsoft.com/en-us/azure/aks/workload-identity-overview#service-account-annotations)
## @param azureWorkloadIdentity.enabled Whether or not to add Azure Workload Identity labels
## @param azureWorkloadIdentity.clientId The Azure AD application client ID to be used with the pod (you must also set serviceAccount.create to true)
##
azureWorkloadIdentity:
  enabled: false
  clientId: ""

## Autoscaling deployment settings
## ref: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
## @param autoscaling.enabled Default to true. Enable autoscaling
## @param autoscaling.minReplicas Minimum number of ASP.NET Core replicas
## @param autoscaling.maxReplicas Maximum number of ASP.NET Core replicas, minimum is minReplicas value.
## @param autoscaling.targetCPUUtilizationPercentage Target CPU utilization percentage for autoscaling
autoscaling:
  enabled: true
  name: ""
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

## @param extraVolumes Optionally specify extra list of additional volumes, e.g:
## extraVolumes:
##   - name: config-vol
##     emptyDir: {}
##
extraVolumes: []

## @param extraEnvVars Extra environment variables to be set on ASP.NET Core container, e.g:

## @param extraVolumeMounts Optionally specify extra list of additional volumeMounts, e.g:
## extraVolumeMounts:
##   - name: config-vol
##     mountPath: /etc/config
##
extraVolumeMounts: []

## Replace the container's certificate store with Workleap's certificate store which is stored in a ConfigMap created by trust-manager
## @param certificateStore.enabled Whether or not to replace the container's certificate store with Workleap's
## @param certificateStore.configMapName The name of the ConfigMap containing the certificate store (usually always "workleap-trust-bundle")
## @param certificateStore.fileName The name of the file inside the ConfigMap to mount as the certificate store in the container (usually always "ca-certificates.crt")
certificateStore:
  enabled: false
  configMapName: "workleap-trust-bundle"
  fileName: "ca-certificates.crt"


## Configure Linux kernel security parameters. The config below is ONLY suitable for services interacting with MongoDB Atlas.
## ref: https://www.mongodb.com/docs/manual/faq/diagnostics/#does-tcp-keepalive-time-affect-mongodb-deployments
## @param securityContext.enabled Enable security context
## @param securityContext.sysctls List of sysctls to set in the container
securityContext:
  enabled: false
  sysctls:
  - name: net.ipv4.tcp_keepalive_time
    value: "120"
  - name: net.ipv4.tcp_keepalive_intvl
    value: "30"
  - name: net.ipv4.tcp_keepalive_probes
    value: "8"

## Extra fields merged into the pod-level securityContext, on top of any defaults
## set by `presets.restrictedSecurityContext` and the sysctls block above.
## User-provided keys overwrite preset keys. Useful for adding e.g. `fsGroup`.
## @param podSecurityContext Extra fields merged into the pod's spec.securityContext
podSecurityContext: {}

## Extra fields merged into the container-level securityContext, on top of any
## defaults set by `presets.restrictedSecurityContext`. User-provided keys
## overwrite preset keys. Useful for adding e.g. `readOnlyRootFilesystem: true`
## or whitelisting a single capability via `capabilities.add: ["NET_BIND_SERVICE"]`.
## @param containerSecurityContext Extra fields merged into the container's securityContext
containerSecurityContext: {}

## Configure settings related to HELM chart migration.
## @param migration.existingSelectors.enabled Whether or not to use existing selectors for the deployment
## @param migration.existingSelectors.selectors A map of existing selectors to use for the deployment
migration:
  existingSelectors:
    enabled: false
    selectors: {}

## Handles more complex configurations in an opiniated way
presets:
  ## Configure a `topologySpreadConstraints` for the deployment spreading pods across nodes in a best effort way
  ## Setting the chart Values.topologySpreadConstraints will override this preset
  spreadAcrossNodes:
    enabled: true

  ## Restricted security context preset — ENABLED BY DEFAULT in 5.2.0.
  ##
  ## When enabled, the chart applies a Pod Security Standards "Restricted"
  ## baseline to every pod and container it renders:
  ##   - Pod  spec.securityContext.runAsNonRoot:                true
  ##   - Container .securityContext.allowPrivilegeEscalation:   false
  ##   - Container .securityContext.capabilities.drop:          [ALL]
  ##
  ## Rationale (long form: MIGRATION.md, v5.1 → v5.2):
  ##   1. Secure-by-default — workloads are hardened by using the shared
  ##      chart, not by every team remembering to add a securityContext block.
  ##   2. Pod Security Standards Restricted alignment — keeps the chart
  ##      compatible with cluster-side PSS admission if it is ever enforced.
  ##   3. Defense in depth on top of the image's USER directive. Drops the
  ##      default container capability set (CHOWN, DAC_OVERRIDE, NET_RAW,
  ##      SETUID, etc.) that HTTP workloads never need.
  ##
  ## Extend or override individual fields via `podSecurityContext` /
  ## `containerSecurityContext` above (user keys win over preset keys).
  ##
  ## Opt out with `enabled: false` — only with explicit justification, and
  ## please document the reason inline in your values.yaml.
  ##
  ## @param presets.restrictedSecurityContext.enabled Apply the PSS Restricted baseline to pod + container
  restrictedSecurityContext:
    enabled: true
